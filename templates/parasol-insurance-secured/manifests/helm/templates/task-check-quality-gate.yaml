apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: check-quality-gate-secured
  namespace: ${{ values.namespace }}
spec:
  params:
    - name: QUALITY_GATE_STATUS
      type: string
    - name: REPORT_URL
      type: string
  steps:
    - name: check
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/usr/bin/env bash
        echo "Quality Gate: $(params.QUALITY_GATE_STATUS)"
        echo "Report: $(params.REPORT_URL)"
        if [ "$(params.QUALITY_GATE_STATUS)" != "PASSED" ]; then
          echo ""
          echo "============================================"
          echo "QUALITY GATE FAILED"
          echo "Review: $(params.REPORT_URL)"
          echo "============================================"
          exit 1
        fi
        echo "Quality gate passed."
